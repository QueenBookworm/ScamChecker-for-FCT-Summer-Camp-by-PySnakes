<!DOCTYPE html>
<html lang="vi" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <link rel="stylesheet" href="../static/result.css">
    <title>ScamCheck</title>
    
</head>
<body>
<input type="checkbox" id="menu-toggle" hidden>

<label for="menu-toggle" class="menu-icon">☰</label>

<div class="side-menu">
    <label for="menu-toggle" class="close-btn">×</label>
    <h2>Menu</h2>
    <a href="/">Scam Checker</a>
    <a href="/history">History</a>
</div>

<div class="form-container">
    <h1 style="text-align:center; color:#042615">Result</h1>
    <form action="/" method="GET" enctype="multipart/form-data">            
        
        <div class="response">
            <h2 style="text-align:center; color:#042615">{{status}}</h2>
            <div class="circle" style="background: conic-gradient({{color}} 0% {{ scam_score }}%, #07B85A {{ scam_score }}% 100%);">
                <span class="score">{{ scam_score }}%</span>
            </div>
        </div>
        <div class="response">
            <p>{{original_message}}</p>
            <p>{{message}}</p>
        </div>
        <button type="submit">Return to ScamChecker</button>
    </form>
    
</div>

</body>
</html>
